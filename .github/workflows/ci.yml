name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest

    # Live Postgres + MySQL containers so the integration suites under
    # packages/core/test/db-{postgres,mysql}.test.ts exercise real drivers.
    # The suites `describe.skip` themselves when the env URLs are unset, so
    # removing a service here silently drops those tests — watch for that.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: hopak
          POSTGRES_PASSWORD: hopak
          POSTGRES_DB: hopak_test
        ports: ['5432:5432']
        options: >-
          --health-cmd="pg_isready -U hopak"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: hopak
          MYSQL_DATABASE: hopak_test
          MYSQL_USER: hopak
          MYSQL_PASSWORD: hopak
        ports: ['3306:3306']
        options: >-
          --health-cmd="mysqladmin ping -h localhost -phopak"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20

    env:
      POSTGRES_URL: postgres://hopak:hopak@localhost:5432/hopak_test
      MYSQL_URL: mysql://hopak:hopak@localhost:3306/hopak_test

    steps:
      - uses: actions/checkout@v4
        with:
          # Need the parent commit to diff `package.json` version bumps against.
          fetch-depth: 2

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bunx --bun @biomejs/biome check .

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun test

      - name: Guard against no-op version bumps
        # Independent versioning only works if version bumps reflect real
        # changes. This step warns when a package.json version changed in
        # the current commit but no corresponding `src/` file did, unless
        # another package in the same commit also bumped — that case
        # represents a transitive bump to stay aligned with a dep and is
        # intentionally allowed.
        run: |
          set -euo pipefail
          if ! git rev-parse HEAD^ >/dev/null 2>&1; then
            echo "No parent commit — skipping version-bump guard."
            exit 0
          fi
          BUMPED=()
          for pkg in packages/*/; do
            PJ="${pkg}package.json"
            [ -f "$PJ" ] || continue
            NEW=$(jq -r .version "$PJ")
            OLD=$(git show HEAD^:"$PJ" 2>/dev/null | jq -r .version 2>/dev/null || echo "")
            if [ -n "$OLD" ] && [ "$NEW" != "$OLD" ]; then
              BUMPED+=("$pkg")
            fi
          done
          if [ ${#BUMPED[@]} -eq 0 ]; then
            echo "No version bumps in this commit."
            exit 0
          fi
          # If more than one package bumped in the same commit, assume a
          # coordinated transitive bump and allow it.
          if [ ${#BUMPED[@]} -gt 1 ]; then
            echo "Multiple packages bumped (${BUMPED[*]}) — treating as coordinated release."
            exit 0
          fi
          SOLO="${BUMPED[0]}"
          SRC_CHANGED=$(git diff --name-only HEAD^ HEAD -- "${SOLO}src/" | wc -l | tr -d ' ')
          if [ "$SRC_CHANGED" = "0" ]; then
            echo "::warning::Version bumped in $SOLO with no src/ changes. Either revert the bump or include the change that justifies it."
          fi
