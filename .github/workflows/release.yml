name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 0.0.2). Must match all package.json versions.'
        required: true
      dry-run:
        description: 'Dry-run only (no publish)'
        type: boolean
        default: false
  push:
    tags:
      - 'v*.*.*'

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  verify:
    name: Verify before release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bunx --bun @biomejs/biome check .

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun test

      - name: Check versions match
        env:
          EVENT: ${{ github.event_name }}
          INPUT_VERSION: ${{ github.event.inputs.version }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [ "$EVENT" = "workflow_dispatch" ]; then
            EXPECTED="$INPUT_VERSION"
          else
            EXPECTED="${REF_NAME#v}"
          fi
          echo "Expected version: $EXPECTED"
          for pkg in packages/*/package.json; do
            ACTUAL=$(jq -r .version "$pkg")
            NAME=$(jq -r .name "$pkg")
            if [ "$ACTUAL" != "$EXPECTED" ]; then
              echo "::error file=$pkg::$NAME version $ACTUAL does not match $EXPECTED"
              exit 1
            fi
            echo "Verified $NAME @ $ACTUAL"
          done

  publish:
    name: Publish to npm
    needs: verify
    runs-on: ubuntu-latest
    environment: npm-publish
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12

      - name: Setup Node (for npm publish with provenance)
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Resolve workspace:* to semver
        env:
          EVENT: ${{ github.event_name }}
          INPUT_VERSION: ${{ github.event.inputs.version }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [ "$EVENT" = "workflow_dispatch" ]; then
            VERSION="$INPUT_VERSION"
          else
            VERSION="${REF_NAME#v}"
          fi
          SEMVER="^$VERSION"
          echo "Rewriting workspace:* to $SEMVER"
          for pkg in packages/*/package.json; do
            NAME=$(jq -r .name "$pkg")
            jq --arg v "$SEMVER" '
              if .dependencies then .dependencies |= with_entries(
                if .value == "workspace:*" then .value = $v else . end
              ) else . end
              |
              if .devDependencies then .devDependencies |= with_entries(
                if .value == "workspace:*" then .value = $v else . end
              ) else . end
              |
              if .peerDependencies then .peerDependencies |= with_entries(
                if .value == "workspace:*" then .value = $v else . end
              ) else . end
            ' "$pkg" > "$pkg.tmp" && mv "$pkg.tmp" "$pkg"
            echo "--- $NAME ---"
            jq '{dependencies, devDependencies, peerDependencies}' "$pkg"
          done

      - name: Publish packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          DRY_RUN: ${{ github.event.inputs.dry-run }}
        run: |
          PUBLISH_FLAGS="--access public --provenance"
          if [ "$DRY_RUN" = "true" ]; then
            PUBLISH_FLAGS="$PUBLISH_FLAGS --dry-run"
            echo "Running in dry-run mode"
          fi
          for pkg in packages/common packages/core packages/testing packages/cli; do
            echo "Publishing $pkg..."
            (cd "$pkg" && npm publish $PUBLISH_FLAGS)
          done
